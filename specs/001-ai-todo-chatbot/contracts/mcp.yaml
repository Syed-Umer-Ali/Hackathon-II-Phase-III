mcp:
  tools:
    - name: add_task
      description: Create a new todo task
      input_schema:
        type: object
        properties:
          user_id: {type: string}
          title: {type: string}
          description: {type: string}
        required: [user_id, title]
    - name: list_tasks
      description: List existing tasks
      input_schema:
        type: object
        properties:
          user_id: {type: string}
          status: {type: string, enum: [all, pending, completed]}
        required: [user_id]
    - name: complete_task
      description: Mark a task as complete
      input_schema:
        type: object
        properties:
          user_id: {type: string}
          task_id: {type: integer}
        required: [user_id, task_id]
    - name: delete_task
      description: Delete a task
      input_schema:
        type: object
        properties:
          user_id: {type: string}
          task_id: {type: integer}
        required: [user_id, task_id]
    - name: update_task
      description: Update task title or description
      input_schema:
        type: object
        properties:
          user_id: {type: string}
          task_id: {type: integer}
          title: {type: string}
          description: {type: string}
        required: [user_id, task_id]
